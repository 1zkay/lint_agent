<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <circle cx="50" cy="50" r="50" fill="#1a1a2e"/>
  <!-- chip body -->
  <rect x="28" y="28" width="44" height="44" rx="6" ry="6" fill="#16213e" stroke="#4a90d9" stroke-width="2"/>
  <!-- chip core -->
  <rect x="38" y="38" width="24" height="24" rx="3" ry="3" fill="#0f3460" stroke="#4a90d9" stroke-width="1.5"/>
  <!-- pins top -->
  <line x1="38" y1="28" x2="38" y2="22" stroke="#4a90d9" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="28" x2="50" y2="22" stroke="#4a90d9" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="62" y1="28" x2="62" y2="22" stroke="#4a90d9" stroke-width="2.5" stroke-linecap="round"/>
  <!-- pins bottom -->
  <line x1="38" y1="72" x2="38" y2="78" stroke="#4a90d9" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="72" x2="50" y2="78" stroke="#4a90d9" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="62" y1="72" x2="62" y2="78" stroke="#4a90d9" stroke-width="2.5" stroke-linecap="round"/>
  <!-- pins left -->
  <line x1="28" y1="38" x2="22" y2="38" stroke="#4a90d9" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="28" y1="50" x2="22" y2="50" stroke="#4a90d9" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="28" y1="62" x2="22" y2="62" stroke="#4a90d9" stroke-width="2.5" stroke-linecap="round"/>
  <!-- pins right -->
  <line x1="72" y1="38" x2="78" y2="38" stroke="#4a90d9" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="72" y1="50" x2="78" y2="50" stroke="#4a90d9" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="72" y1="62" x2="78" y2="62" stroke="#4a90d9" stroke-width="2.5" stroke-linecap="round"/>
  <!-- inner dots -->
  <circle cx="44" cy="44" r="2.5" fill="#4a90d9"/>
  <circle cx="56" cy="44" r="2.5" fill="#4a90d9"/>
  <circle cx="44" cy="56" r="2.5" fill="#4a90d9"/>
  <circle cx="56" cy="56" r="2.5" fill="#4a90d9"/>
  <circle cx="50" cy="50" r="3" fill="#e94560"/>
</svg>